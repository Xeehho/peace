name: Auto Dev

on:
  issues:
    types: [labeled, reopened]
  workflow_dispatch:
    inputs:
      issue:
        description: 'Issue number with the requirement'
        required: true

jobs:
  auto-dev:
    # Only run when the issue carries the `requirement` label, or on manual dispatch.
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event.action == 'labeled' && github.event.label.name == 'requirement') ||
      (github.event.action == 'reopened' && contains(github.event.issue.labels.*.name, 'requirement'))
    name: Autonomous development from requirement
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      CI: 'true'
    steps:
      - name: Resolve issue number
        id: issue
        run: |
          if [ -n "${{ inputs.issue }}" ]; then
            echo "num=${{ inputs.issue }}" >> $GITHUB_OUTPUT
          else
            echo "num=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git identity
        run: |
          git config user.name "TRAE AI Bot"
          git config user.email "noreply@trae.ai"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run autonomous development
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/auto-dev.mjs --issue ${{ steps.issue.outputs.num }}
