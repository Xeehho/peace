name: TRAE Attribution

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

jobs:
  ensure-trae-trailer:
    name: Ensure TRAE AI co-author on commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Ensure TRAE trailer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/ensure-trae-trailer.sh "${{ github.base_ref }}" "${{ github.head_ref }}"

      - name: Comment on PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "✅ TRAE AI co-author trailer verified/added on all commits." --repo ${{ github.repository }} || true
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "⚠️ TRAE attribution check failed. Commits should carry \`Co-authored-by: TRAE AI\`." --repo ${{ github.repository }} || true
          fi
